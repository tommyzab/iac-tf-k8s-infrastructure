name: terraform-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: terraform
  AWS_REGION: us-east-1
  STATE_BUCKET: terraform-state-tommy-infra-v1
  STATE_TABLE: terraform-state-locking-v1

jobs:
  terraform:
    name: Terraform Fmt / Validate / Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap State Resources (if missing)
        run: |
          # Check for S3 bucket
          if aws s3api head-bucket --bucket ${{ env.STATE_BUCKET }} 2>/dev/null; then
            BUCKET_EXISTS="true"
          else
            BUCKET_EXISTS="false"
          fi

          # Check for DynamoDB table
          if aws dynamodb describe-table --table-name ${{ env.STATE_TABLE }} 2>/dev/null; then
            TABLE_EXISTS="true"
          else
            TABLE_EXISTS="false"
          fi

          if [ "$BUCKET_EXISTS" = "false" ] || [ "$TABLE_EXISTS" = "false" ]; then
            echo "State resources missing (Bucket: $BUCKET_EXISTS, Table: $TABLE_EXISTS). Bootstrapping..."
            cd bootstrap
            terraform init
            
            # Import existing resources if only one is missing to avoid conflict errors
            if [ "$BUCKET_EXISTS" = "true" ]; then
              terraform import aws_s3_bucket.terraform_state ${{ env.STATE_BUCKET }} || true
            fi
            if [ "$TABLE_EXISTS" = "true" ]; then
              terraform import aws_dynamodb_table.terraform_locks ${{ env.STATE_TABLE }} || true
            fi

            terraform apply -auto-approve
            cd ..
          else
            echo "State resources already exist."
          fi

      - name: Terraform Init (dev)
        run: terraform init -backend-config=environments/dev/backend.hcl

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (dev)
        id: plan
        run: |
          terraform plan \
            -var-file=environments/dev/terraform.tfvars \
            -out=tfplan-dev
        continue-on-error: true

      - name: Show Plan (dev)
        if: steps.plan.outcome != 'failure'
        run: terraform show -no-color tfplan-dev > tfplan-dev.txt

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planPath = '${{ env.TF_WORKING_DIR }}/tfplan-dev.txt';
            const plan = fs.existsSync(planPath) ? fs.readFileSync(planPath, 'utf8') : 'Plan not available';
            const max = 65000;
            const body = plan.length > max ? plan.slice(0, max) + '\n\n...(truncated)...' : plan;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terraform Plan (dev)\n\n\`\`\`hcl\n${body}\n\`\`\``
            });

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: |
          echo "Terraform plan failed."
          exit 1
